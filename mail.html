<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출결기록실 — 메일 이력</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
<div class="container">

  <div class="mast-meta">
    <span data-mast-date>—</span>
    <span><span class="dot-ok">●</span>&nbsp; <span data-sync-label>SHEETS 동기화</span></span>
    <span class="meta-email" data-mast-email>이메일을 설정하세요</span>
  </div>
  <header class="mast">
    <h1 class="wordmark"><a href="index.html">출결기록실</a><small>ATTENDANCE ARCHIVE · 실무프로젝트 1</small></h1>
    <nav class="index">
      <div class="idx-label">색인</div>
      <a href="index.html"><b>01</b>오늘</a>
      <a href="history.html"><b>02</b>근태 내역</a>
      <a href="stats.html"><b>03</b>통계</a>
      <a class="on" href="mail.html"><b>04</b>메일 이력</a>
    </nav>
  </header>
  <hr class="rule-heavy">

  <div class="page-head fx">
    <div class="ph-no">04 — 메일 이력</div>
    <h2>Gemini가 쓰고,<br>Gmail이 보냈습니다.</h2>
    <p>지각·결근 감지 시 자동 생성된 개인화 안내 메일의 발송 대장.</p>
  </div>

  <div class="filters fx" style="transition-delay:.15s">
    <span class="f-label">필터</span>
    <select class="f-select" id="fType">
      <option value="">전체 구분</option>
      <option>지각</option><option>결근</option>
    </select>
    <select class="f-select" id="fState">
      <option value="">전체 상태</option>
      <option>발송됨</option><option>대기 중</option>
    </select>
    <input class="f-input" id="fName" type="search" placeholder="이름 검색">
    <span class="f-count">총 <b id="fTotal">0</b>건</span>
  </div>

  <div class="fx" style="transition-delay:.25s;padding-bottom:90px">
    <table class="ledger">
      <thead>
        <tr><th style="width:120px">날짜</th><th style="width:100px">구분</th><th style="width:110px">수신자</th><th>제목</th><th style="width:140px">발송</th></tr>
      </thead>
      <tbody id="mailBody"></tbody>
    </table>
  </div>

  <hr class="rule-heavy">
  <footer>
    <span>© 2026 출결기록실 — 실무프로젝트 1</span>
    <span class="pipe">FORMS<i>/</i>SHEETS<i>/</i>MAKE<i>/</i>GEMINI<i>/</i>GMAIL</span>
  </footer>
</div>

<script src="js/config.js?v=2"></script>
<script src="js/data.js?v=2"></script>
<script src="js/app.js?v=2"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const D = await loadData();
  document.querySelector("[data-sync-label]").textContent = D.demo ? "데모 데이터" : "SHEETS 동기화";

  const body = document.getElementById("mailBody");
  const fType = document.getElementById("fType");
  const fState = document.getElementById("fState");
  const fName = document.getElementById("fName");
  const fTotal = document.getElementById("fTotal");

  function render() {
    const rows = D.mails.filter((m) =>
      (!fType.value || m.type === fType.value) &&
      (!fState.value || m.state === fState.value) &&
      (!fName.value.trim() || m.name.includes(fName.value.trim()))
    );
    fTotal.textContent = rows.length;
    body.innerHTML = rows.length ? rows.map((m) => `<tr>
        <td class="t-time">${m.date.replaceAll("-", ". ")}</td>
        <td>${stMark(m.type)}</td>
        <td class="t-name">${m.name}</td>
        <td class="t-sub">${m.subject}</td>
        <td class="t-sub">${m.state === "발송됨" ? `<b>발송됨</b> ${m.sentAt}` : "대기 중"}</td>
      </tr>`).join("")
      : `<tr class="empty-row"><td colspan="5">조건에 맞는 메일이 없습니다</td></tr>`;
  }

  [fType, fState].forEach((el) => el.addEventListener("change", render));
  fName.addEventListener("input", render);
  render();
});
</script>
</body>
</html>
